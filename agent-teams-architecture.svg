<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="'SF Pro Display','Inter',-apple-system,sans-serif">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0a0a1a"/><stop offset="50%" stop-color="#111827"/><stop offset="100%" stop-color="#0f172a"/>
  </linearGradient>
  <linearGradient id="gL" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#a78bfa"/>
  </linearGradient>
  <linearGradient id="gM" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0891b2"/><stop offset="100%" stop-color="#38bdf8"/>
  </linearGradient>
  <linearGradient id="gT" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#d97706"/><stop offset="100%" stop-color="#f59e0b"/>
  </linearGradient>
  <linearGradient id="gMail" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#34d399"/>
  </linearGradient>
  <linearGradient id="gU" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#db2777"/><stop offset="100%" stop-color="#f472b6"/>
  </linearGradient>
  <linearGradient id="gCtx" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#334155"/><stop offset="100%" stop-color="#475569"/>
  </linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="sh"><feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity=".35"/></filter>
  <marker id="aP" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6" fill="#a78bfa" opacity=".8"/></marker>
  <marker id="aC" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6" fill="#38bdf8" opacity=".8"/></marker>
  <marker id="aG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6" fill="#34d399" opacity=".8"/></marker>
  <marker id="aA" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6" fill="#f59e0b" opacity=".8"/></marker>
  <marker id="aPk" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6" fill="#f472b6" opacity=".8"/></marker>
</defs>
<style><![CDATA[
  @keyframes dash{to{stroke-dashoffset:-24}}
  @keyframes dashR{to{stroke-dashoffset:24}}
  @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
  @keyframes float1{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  @keyframes float2{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  @keyframes float3{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  @keyframes glowP{0%,100%{filter:drop-shadow(0 0 6px rgba(124,58,237,.25))}50%{filter:drop-shadow(0 0 18px rgba(124,58,237,.55))}}
  @keyframes ring{0%{r:22;opacity:.6}100%{r:36;opacity:0}}
  @keyframes dotM{0%,100%{opacity:.3}50%{opacity:1}}
  .fl{stroke-dasharray:12,12;animation:dash 1.5s linear infinite}
  .flR{stroke-dasharray:12,12;animation:dashR 1.5s linear infinite}
  .flS{stroke-dasharray:8,16;animation:dash 2.5s linear infinite}
  .p{animation:pulse 2.5s ease-in-out infinite}
  .f1{animation:float1 4s ease-in-out infinite}
  .f2{animation:float2 5s ease-in-out infinite}
  .f3{animation:float3 3.5s ease-in-out infinite}
  .gp{animation:glowP 3s ease-in-out infinite}
]]></style>

<!-- 背景 -->
<rect width="1200" height="820" fill="url(#bg)" rx="0"/>
<!-- 网格装饰 -->
<g opacity=".04" stroke="#94a3b8" stroke-width=".5">
  <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
  <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
  <line x1="0" y1="500" x2="1200" y2="500"/><line x1="0" y1="600" x2="1200" y2="600"/>
  <line x1="0" y1="700" x2="1200" y2="700"/>
  <line x1="200" y1="0" x2="200" y2="820"/><line x1="400" y1="0" x2="400" y2="820"/>
  <line x1="600" y1="0" x2="600" y2="820"/><line x1="800" y1="0" x2="800" y2="820"/>
  <line x1="1000" y1="0" x2="1000" y2="820"/>
</g>

<!-- 标题 -->
<text x="600" y="48" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="700" letter-spacing="1">
  Claude Code · Agent Teams Architecture</text>
<text x="600" y="72" text-anchor="middle" fill="#64748b" font-size="12" letter-spacing=".5">
  Orchestrate multiple Claude Code sessions with shared tasks and inter-agent messaging</text>

<!-- ═══════════ 连线层（底层） ═══════════ -->

<!-- User → Lead：指令 -->
<path d="M160,190 C160,240 440,200 440,260" stroke="#f472b6" stroke-width="2" fill="none" class="fl" marker-end="url(#aPk)" opacity=".7"/>
<!-- Lead → Teammate 1 -->
<path d="M540,380 C580,430 620,440 660,470" stroke="#a78bfa" stroke-width="2" fill="none" class="fl" marker-end="url(#aP)" opacity=".6"/>
<!-- Lead → Teammate 2 -->
<path d="M480,380 C480,430 480,440 480,470" stroke="#a78bfa" stroke-width="2" fill="none" class="fl" marker-end="url(#aP)" opacity=".6"/>
<!-- Lead → Teammate 3 -->
<path d="M420,380 C380,430 340,440 300,470" stroke="#a78bfa" stroke-width="2" fill="none" class="fl" marker-end="url(#aP)" opacity=".6"/>

<!-- Teammate 互相通信（双向） -->
<path d="M370,530 Q480,500 590,530" stroke="#34d399" stroke-width="1.5" fill="none" class="fl" marker-end="url(#aG)" opacity=".5"/>
<path d="M590,550 Q480,580 370,550" stroke="#34d399" stroke-width="1.5" fill="none" class="flR" marker-end="url(#aG)" opacity=".5"/>

<!-- Lead ↔ Task List -->
<path d="M580,320 L810,250" stroke="#f59e0b" stroke-width="2" fill="none" class="flS" marker-end="url(#aA)" opacity=".5"/>
<!-- Teammates → Task List -->
<path d="M370,510 C500,460 750,380 830,280" stroke="#f59e0b" stroke-width="1.2" fill="none" class="flS" opacity=".3"/>
<path d="M540,490 C650,420 770,350 840,280" stroke="#f59e0b" stroke-width="1.2" fill="none" class="flS" opacity=".3"/>
<path d="M700,510 C750,430 810,350 850,280" stroke="#f59e0b" stroke-width="1.2" fill="none" class="flS" opacity=".3"/>

<!-- Lead ↔ Mailbox -->
<path d="M380,310 C300,320 200,330 160,340" stroke="#34d399" stroke-width="1.5" fill="none" class="fl" marker-end="url(#aG)" opacity=".4"/>
<!-- Teammates ↔ Mailbox -->
<path d="M240,490 C180,470 140,450 130,440" stroke="#34d399" stroke-width="1" fill="none" class="flS" opacity=".3"/>

<!-- User → Teammates 直接交互 -->
<path d="M140,210 C100,340 160,440 240,500" stroke="#f472b6" stroke-width="1.2" fill="none" class="flS" marker-end="url(#aPk)" opacity=".3"/>

<!-- ═══════════ User 节点 ═══════════ -->
<g class="f3">
  <circle cx="140" cy="165" r="22" fill="none" stroke="#f472b6" stroke-width="1" opacity=".3">
    <animate attributeName="r" values="22;36;22" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".3;0;.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="140" cy="165" r="22" fill="url(#gU)" filter="url(#sh)"/>
  <text x="140" y="160" text-anchor="middle" fill="#fff" font-size="18">👤</text>
  <text x="140" y="178" text-anchor="middle" fill="#fce7f3" font-size="8" font-weight="600">USER</text>
  <text x="140" y="210" text-anchor="middle" fill="#f9a8d4" font-size="9" opacity=".8">Shift+↓ 直接交互</text>
</g>

<!-- ═══════════ Team Lead ═══════════ -->
<g class="gp f1">
  <rect x="380" y="260" width="200" height="120" rx="16" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh)" opacity=".95"/>
  <rect x="380" y="260" width="200" height="32" rx="16" fill="url(#gL)" opacity=".15"/>
  <!-- 图标 -->
  <circle cx="405" cy="280" r="10" fill="url(#gL)" opacity=".9"/>
  <text x="405" y="284" text-anchor="middle" fill="#fff" font-size="11">⚡</text>
  <text x="425" y="284" fill="#c4b5fd" font-size="13" font-weight="700">Team Lead</text>
  <line x1="395" y1="298" x2="565" y2="298" stroke="#7c3aed" stroke-width=".5" opacity=".3"/>
  <!-- 职责列表 -->
  <text x="400" y="316" fill="#a5b4fc" font-size="10">● 创建团队 · 分配任务</text>
  <text x="400" y="332" fill="#a5b4fc" font-size="10">● 协调工作 · 综合结果</text>
  <text x="400" y="348" fill="#a5b4fc" font-size="10">● 审批计划 · 关闭团队</text>
  <!-- 权限标签 -->
  <rect x="390" y="358" width="80" height="16" rx="8" fill="#7c3aed" opacity=".2"/>
  <text x="430" y="369" text-anchor="middle" fill="#c4b5fd" font-size="8">Permissions ↓</text>
</g>

<!-- ═══════════ Teammates ═══════════ -->
<!-- Teammate 1 -->
<g class="f2" style="animation-delay:0s">
  <rect x="220" y="480" width="170" height="105" rx="14" fill="#0c1a2e" stroke="#0891b2" stroke-width="1.2" filter="url(#sh)" opacity=".92"/>
  <rect x="220" y="480" width="170" height="28" rx="14" fill="url(#gM)" opacity=".12"/>
  <circle cx="242" cy="497" r="8" fill="url(#gM)" opacity=".8"/>
  <text x="242" y="501" text-anchor="middle" fill="#fff" font-size="9">🔍</text>
  <text x="258" y="500" fill="#67e8f9" font-size="11" font-weight="600">Researcher</text>
  <line x1="232" y1="512" x2="378" y2="512" stroke="#0891b2" stroke-width=".4" opacity=".3"/>
  <text x="234" y="528" fill="#7dd3fc" font-size="9">独立 Context Window</text>
  <text x="234" y="543" fill="#7dd3fc" font-size="9">加载 CLAUDE.md / MCP</text>
  <text x="234" y="558" fill="#7dd3fc" font-size="9">自主认领 · 直接通信</text>
  <!-- 状态指示灯 -->
  <circle cx="374" cy="494" r="4" fill="#22d3ee" class="p"/>
</g>

<!-- Teammate 2 -->
<g class="f1" style="animation-delay:.5s">
  <rect x="410" y="480" width="170" height="105" rx="14" fill="#0c1a2e" stroke="#0891b2" stroke-width="1.2" filter="url(#sh)" opacity=".92"/>
  <rect x="410" y="480" width="170" height="28" rx="14" fill="url(#gM)" opacity=".12"/>
  <circle cx="432" cy="497" r="8" fill="url(#gM)" opacity=".8"/>
  <text x="432" y="501" text-anchor="middle" fill="#fff" font-size="9">🛠</text>
  <text x="448" y="500" fill="#67e8f9" font-size="11" font-weight="600">Implementer</text>
  <line x1="422" y1="512" x2="568" y2="512" stroke="#0891b2" stroke-width=".4" opacity=".3"/>
  <text x="424" y="528" fill="#7dd3fc" font-size="9">独立 Context Window</text>
  <text x="424" y="543" fill="#7dd3fc" font-size="9">加载 CLAUDE.md / MCP</text>
  <text x="424" y="558" fill="#7dd3fc" font-size="9">自主认领 · 直接通信</text>
  <circle cx="564" cy="494" r="4" fill="#22d3ee" class="p" style="animation-delay:.8s"/>
</g>

<!-- Teammate 3 -->
<g class="f3" style="animation-delay:1s">
  <rect x="600" y="480" width="170" height="105" rx="14" fill="#0c1a2e" stroke="#0891b2" stroke-width="1.2" filter="url(#sh)" opacity=".92"/>
  <rect x="600" y="480" width="170" height="28" rx="14" fill="url(#gM)" opacity=".12"/>
  <circle cx="622" cy="497" r="8" fill="url(#gM)" opacity=".8"/>
  <text x="622" y="501" text-anchor="middle" fill="#fff" font-size="9">🧪</text>
  <text x="638" y="500" fill="#67e8f9" font-size="11" font-weight="600">Reviewer</text>
  <line x1="612" y1="512" x2="758" y2="512" stroke="#0891b2" stroke-width=".4" opacity=".3"/>
  <text x="614" y="528" fill="#7dd3fc" font-size="9">独立 Context Window</text>
  <text x="614" y="543" fill="#7dd3fc" font-size="9">加载 CLAUDE.md / MCP</text>
  <text x="614" y="558" fill="#7dd3fc" font-size="9">自主认领 · 直接通信</text>
  <circle cx="754" cy="494" r="4" fill="#22d3ee" class="p" style="animation-delay:1.5s"/>
</g>

<!-- ═══════════ Shared Task List ═══════════ -->
<g class="f2" style="animation-delay:.3s">
  <rect x="810" y="140" width="220" height="160" rx="14" fill="#1c1208" stroke="#d97706" stroke-width="1.2" filter="url(#sh)" opacity=".92"/>
  <rect x="810" y="140" width="220" height="28" rx="14" fill="url(#gT)" opacity=".12"/>
  <text x="830" y="160" fill="#fbbf24" font-size="13" font-weight="700">📋 Shared Task List</text>
  <line x1="822" y1="174" x2="1018" y2="174" stroke="#d97706" stroke-width=".4" opacity=".3"/>
  <!-- 任务条目 -->
  <rect x="824" y="182" width="12" height="12" rx="3" fill="#22c55e" opacity=".8"/>
  <text x="824" y="191" text-anchor="middle" fill="#fff" font-size="7" dx="6">✓</text>
  <text x="844" y="192" fill="#86efac" font-size="10">Task 1 — completed</text>

  <rect x="824" y="202" width="12" height="12" rx="3" fill="#3b82f6" opacity=".8"/>
  <text x="830" y="211" fill="#fff" font-size="7">▶</text>
  <text x="844" y="212" fill="#93c5fd" font-size="10">Task 2 — in_progress</text>
  <circle cx="1010" cy="208" r="3" fill="#38bdf8" class="p"/>

  <rect x="824" y="222" width="12" height="12" rx="3" fill="#64748b" opacity=".6"/>
  <text x="844" y="232" fill="#94a3b8" font-size="10">Task 3 — pending</text>

  <rect x="824" y="242" width="12" height="12" rx="3" fill="#64748b" opacity=".4"/>
  <text x="844" y="252" fill="#64748b" font-size="10">Task 4 — blocked ⛓</text>

  <!-- 路径标签 -->
  <text x="920" y="290" text-anchor="middle" fill="#92400e" font-size="8" opacity=".6">~/.claude/tasks/{team}/</text>
</g>

<!-- ═══════════ Mailbox ═══════════ -->
<g class="f1" style="animation-delay:.7s">
  <rect x="40" y="330" width="170" height="110" rx="14" fill="#052e16" stroke="#059669" stroke-width="1.2" filter="url(#sh)" opacity=".92"/>
  <rect x="40" y="330" width="170" height="28" rx="14" fill="url(#gMail)" opacity=".12"/>
  <text x="60" y="350" fill="#6ee7b7" font-size="13" font-weight="700">✉ Mailbox</text>
  <line x1="52" y1="364" x2="198" y2="364" stroke="#059669" stroke-width=".4" opacity=".3"/>
  <text x="54" y="382" fill="#a7f3d0" font-size="10">● message → 单播</text>
  <text x="54" y="398" fill="#a7f3d0" font-size="10">● broadcast → 广播</text>
  <text x="54" y="414" fill="#a7f3d0" font-size="10">● idle 通知 → 自动</text>
  <text x="54" y="430" fill="#a7f3d0" font-size="10">● shutdown 请求/响应</text>
</g>

<!-- ═══════════ Context 加载区 ═══════════ -->
<g class="f3" style="animation-delay:1.2s">
  <rect x="810" y="360" width="220" height="100" rx="14" fill="#1e293b" stroke="#475569" stroke-width="1" filter="url(#sh)" opacity=".85"/>
  <rect x="810" y="360" width="220" height="26" rx="14" fill="url(#gCtx)" opacity=".1"/>
  <text x="830" y="378" fill="#94a3b8" font-size="11" font-weight="600">📦 Shared Context (per agent)</text>
  <line x1="822" y1="390" x2="1018" y2="390" stroke="#475569" stroke-width=".4" opacity=".3"/>
  <text x="828" y="408" fill="#cbd5e1" font-size="10">CLAUDE.md</text>
  <rect x="900" y="397" width="4" height="4" rx="2" fill="#475569"/>
  <text x="912" y="408" fill="#cbd5e1" font-size="10">MCP Servers</text>
  <text x="828" y="426" fill="#cbd5e1" font-size="10">Skills</text>
  <rect x="862" y="415" width="4" height="4" rx="2" fill="#475569"/>
  <text x="874" y="426" fill="#cbd5e1" font-size="10">Spawn Prompt</text>
  <text x="828" y="446" fill="#64748b" font-size="9" font-style="italic">⚠ 不继承 Lead 对话历史</text>
</g>

<!-- ═══════════ Hooks 区域 ═══════════ -->
<g class="f2" style="animation-delay:.9s">
  <rect x="810" y="500" width="220" height="80" rx="14" fill="#1a0f2e" stroke="#7c3aed" stroke-width="1" filter="url(#sh)" opacity=".8"/>
  <rect x="810" y="500" width="220" height="24" rx="14" fill="url(#gL)" opacity=".08"/>
  <text x="830" y="517" fill="#c4b5fd" font-size="11" font-weight="600">🪝 Quality Hooks</text>
  <line x1="822" y1="528" x2="1018" y2="528" stroke="#7c3aed" stroke-width=".3" opacity=".3"/>
  <text x="828" y="546" fill="#a5b4fc" font-size="10">TeammateIdle → 反馈继续工作</text>
  <text x="828" y="564" fill="#a5b4fc" font-size="10">TaskCompleted → 阻止/反馈</text>
</g>

<!-- ═══════════ 图例 ═══════════ -->
<g transform="translate(60,650)">
  <rect x="0" y="0" width="1080" height="120" rx="12" fill="#0f172a" stroke="#1e293b" stroke-width="1" opacity=".8"/>
  <text x="540" y="24" text-anchor="middle" fill="#64748b" font-size="11" font-weight="600" letter-spacing="2">LEGEND</text>

  <!-- 行1 -->
  <line x1="40" y1="50" x2="80" y2="50" stroke="#f472b6" stroke-width="2" stroke-dasharray="12,12"/>
  <text x="90" y="54" fill="#f9a8d4" font-size="10">User 指令 / 直接交互</text>

  <line x1="280" y1="50" x2="320" y2="50" stroke="#a78bfa" stroke-width="2" stroke-dasharray="12,12"/>
  <text x="330" y="54" fill="#c4b5fd" font-size="10">Lead → Teammate 派发</text>

  <line x1="520" y1="50" x2="560" y2="50" stroke="#34d399" stroke-width="2" stroke-dasharray="12,12"/>
  <text x="570" y="54" fill="#a7f3d0" font-size="10">Agent 间消息通信</text>

  <line x1="760" y1="50" x2="800" y2="50" stroke="#f59e0b" stroke-width="2" stroke-dasharray="8,16"/>
  <text x="810" y="54" fill="#fcd34d" font-size="10">Task List 读写</text>

  <!-- 行2 -->
  <circle cx="55" cy="85" r="4" fill="#22d3ee" opacity=".8"/>
  <text x="70" y="89" fill="#7dd3fc" font-size="10">Active 状态</text>

  <circle cx="215" cy="85" r="4" fill="#22c55e" opacity=".8"/>
  <text x="230" y="89" fill="#86efac" font-size="10">Completed</text>

  <circle cx="355" cy="85" r="4" fill="#3b82f6" opacity=".8"/>
  <text x="370" y="89" fill="#93c5fd" font-size="10">In Progress</text>

  <circle cx="495" cy="85" r="4" fill="#64748b" opacity=".6"/>
  <text x="510" y="89" fill="#94a3b8" font-size="10">Pending / Blocked</text>

  <rect x="660" y="78" width="14" height="14" rx="4" fill="none" stroke="#7c3aed" stroke-width="1" opacity=".6"/>
  <text x="682" y="89" fill="#c4b5fd" font-size="10">Permissions 继承自 Lead</text>

  <text x="870" y="89" fill="#475569" font-size="10">Config: ~/.claude/teams/{name}/config.json</text>
</g>

<!-- 数据流动粒子效果 -->
<circle r="3" fill="#a78bfa" opacity=".8">
  <animateMotion dur="3s" repeatCount="indefinite" path="M540,380 C580,430 620,440 660,470"/>
</circle>
<circle r="3" fill="#a78bfa" opacity=".6" style="animation-delay:1s">
  <animateMotion dur="3s" repeatCount="indefinite" path="M480,380 C480,430 480,440 480,470" begin="1s"/>
</circle>
<circle r="3" fill="#a78bfa" opacity=".7">
  <animateMotion dur="3s" repeatCount="indefinite" path="M420,380 C380,430 340,440 300,470" begin="2s"/>
</circle>
<circle r="2.5" fill="#34d399" opacity=".7">
  <animateMotion dur="4s" repeatCount="indefinite" path="M370,530 Q480,500 590,530"/>
</circle>
<circle r="2.5" fill="#34d399" opacity=".5">
  <animateMotion dur="4s" repeatCount="indefinite" path="M590,550 Q480,580 370,550" begin="2s"/>
</circle>
<circle r="2" fill="#f59e0b" opacity=".6">
  <animateMotion dur="5s" repeatCount="indefinite" path="M580,320 L810,250"/>
</circle>
<circle r="2.5" fill="#f472b6" opacity=".7">
  <animateMotion dur="4s" repeatCount="indefinite" path="M160,190 C160,240 440,200 440,260"/>
</circle>

</svg>
