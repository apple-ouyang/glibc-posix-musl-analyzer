    <!-- 节点 7 -->
    <circle cx="970" cy="65" r="8" fill="#1a1a3e" stroke="#4facfe" stroke-width="2"/>
    <text x="970" y="55" text-anchor="middle" fill="#4facfe" font-size="9" font-weight="600">检查点</text>
    <text x="970" y="88" text-anchor="middle" fill="#7878aa" font-size="10">review + 纠正</text>

    <!-- 节点 8 - 终点 -->
