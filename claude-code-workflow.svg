    <!-- 节点 4 -->
    <circle cx="580" cy="65" r="8" fill="#1a1a3e" stroke="#f093fb" stroke-width="2"/>
    <text x="580" y="55" text-anchor="middle" fill="#f093fb" font-size="9" font-weight="600">/writing-plans</text>
    <text x="580" y="88" text-anchor="middle" fill="#7878aa" font-size="10">制定计划</text>

    <!-- 节点 5 - 循环 -->
    <circle cx="700" cy="65" r="8" fill="#1a1a3e" stroke="#f093fb" stroke-width="2"/>
    <text x="700" y="55" text-anchor="middle" fill="#f093fb" font-size="9" font-weight="600">批注</text>
    <text x="700" y="88" text-anchor="middle" fill="#7878aa" font-size="10">迭代修订</text>
    <!-- 小循环箭头 -->
