    <circle cx="840" cy="65" r="8" fill="#1a1a3e" stroke="#4facfe" stroke-width="2"/>
    <text x="840" y="55" text-anchor="middle" fill="#4facfe" font-size="9" font-weight="600">/executing-plans</text>
