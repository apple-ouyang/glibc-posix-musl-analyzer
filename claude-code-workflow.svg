      <text x="20" y="28" fill="#667eea" font-size="13" font-weight="600">🛡️ 计划先行</text>
      <text x="20" y="48" fill="#9999bb" font-size="11">永远不要让 AI 在你审批计划</text>
      <text x="20" y="64" fill="#9999bb" font-size="11">之前写代码。Plan → Review → Code</text>
      <text x="20" y="80" fill="#667eea" font-size="10" opacity="0.6">— Boris Tane</text>
    </g>

    <!-- 原则卡片 2 -->
    <g transform="translate(340, 50)">
      <rect x="0" y="0" width="250" height="90" rx="12" fill="#1a1a3e" stroke="#444466" stroke-width="0.5"/>
      <text x="20" y="28" fill="#f093fb" font-size="13" font-weight="600">📝 持久化产出物</text>
      <text x="20" y="48" fill="#9999bb" font-size="11">research.md + plan.md 作为</text>
      <text x="20" y="64" fill="#9999bb" font-size="11">"共享可变状态"，跨 compaction 存活</text>
      <text x="20" y="80" fill="#f093fb" font-size="10" opacity="0.6">— Markdown as shared mutable state</text>
    </g>

    <!-- 原则卡片 3 -->
    <g transform="translate(620, 50)">
      <rect x="0" y="0" width="250" height="90" rx="12" fill="#1a1a3e" stroke="#444466" stroke-width="0.5"/>
      <text x="20" y="28" fill="#4facfe" font-size="13" font-weight="600">🎯 角色切换</text>
      <text x="20" y="48" fill="#9999bb" font-size="11">调研/规划阶段: 协作者 (详细指导)</text>
      <text x="20" y="64" fill="#9999bb" font-size="11">执行阶段: 监督者 (简短纠正)</text>
      <text x="20" y="80" fill="#4facfe" font-size="10" opacity="0.6">— Collaborator → Supervisor</text>
    </g>

    <!-- 原则卡片 4 -->
    <g transform="translate(900, 50)">
      <rect x="0" y="0" width="250" height="90" rx="12" fill="#1a1a3e" stroke="#444466" stroke-width="0.5"/>
      <text x="20" y="28" fill="#00f2a0" font-size="13" font-weight="600">🔄 Skill 自动化</text>
      <text x="20" y="48" fill="#9999bb" font-size="11">用 Skill 封装流程，触发词驱动</text>
      <text x="20" y="64" fill="#9999bb" font-size="11">自动归档 + 引用链 + 检查点</text>
      <text x="20" y="80" fill="#00f2a0" font-size="10" opacity="0.6">— Your Enhancement</text>
    </g>
  </g>

  <!-- ═══════════════ 底部: 完整流程时间线 ═══════════════ -->
  <g opacity="0" transform="translate(0, 740)">
